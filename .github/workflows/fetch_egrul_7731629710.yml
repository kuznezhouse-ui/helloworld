name: Temporary EGRUL lookup 7731629710

on:
  push:
    paths:
      - '.github/workflows/fetch_egrul_7731629710.yml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch registry data
        shell: bash
        run: |
          set -u
          mkdir -p out
          python - <<'PY'
          import json, time, requests, traceback
          s = requests.Session()
          s.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/136 Safari/537.36',
              'Referer':'https://egrul.nalog.ru/index.html',
              'Origin':'https://egrul.nalog.ru',
              'Accept':'application/json, text/javascript, */*; q=0.01',
              'X-Requested-With':'XMLHttpRequest'
          })
          try:
              r = s.post('https://egrul.nalog.ru/', data={'query':'7731629710','region':'','PreventChromeAutocomplete':''}, timeout=30)
              open('out/fns_post_status.txt','w').write(str(r.status_code)+'\n'+r.text[:2000])
              r.raise_for_status()
              init = r.json()
              open('out/fns_init.json','w',encoding='utf-8').write(json.dumps(init,ensure_ascii=False,indent=2))
              token = init.get('t')
              if not token:
                  raise RuntimeError(f'FNS token missing: {init}')
              data = None
              for _ in range(15):
                  rr = s.get(f'https://egrul.nalog.ru/search-result/{token}', timeout=30)
                  open('out/fns_search_status.txt','w').write(str(rr.status_code)+'\n'+rr.text[:2000])
                  rr.raise_for_status()
                  try:
                      candidate = rr.json()
                  except Exception:
                      time.sleep(2)
                      continue
                  if candidate.get('rows') is not None:
                      data = candidate
                      break
                  time.sleep(2)
              if data is None:
                  raise RuntimeError('FNS search result timeout')
              open('out/fns_search.json','w',encoding='utf-8').write(json.dumps(data,ensure_ascii=False,indent=2))
              rows = data.get('rows') or []
              if rows:
                  dtok = rows[0].get('t')
                  if dtok:
                      attempts=[]
                      for i in range(20):
                          time.sleep(3 if i else 1)
                          pdf = s.get(f'https://egrul.nalog.ru/vyp-download/{dtok}', timeout=60, headers={'Accept':'application/pdf,application/octet-stream,*/*'})
                          ct=pdf.headers.get('content-type','')
                          attempts.append({'attempt':i+1,'status':pdf.status_code,'content_type':ct,'length':len(pdf.content),'preview':pdf.text[:300] if 'text' in ct else ''})
                          if pdf.status_code == 200 and pdf.content.startswith(b'%PDF'):
                              open('out/fns_extract.pdf','wb').write(pdf.content)
                              break
                      open('out/fns_download_attempts.json','w',encoding='utf-8').write(json.dumps(attempts,ensure_ascii=False,indent=2))
          except Exception:
              open('out/fns_error.txt','w',encoding='utf-8').write(traceback.format_exc())
          PY
          if command -v pdftotext >/dev/null 2>&1 && [ -f out/fns_extract.pdf ]; then
            pdftotext -layout out/fns_extract.pdf out/fns_extract.txt || true
          fi
      - name: Upload lookup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egrul-7731629710
          path: out/
          retention-days: 1

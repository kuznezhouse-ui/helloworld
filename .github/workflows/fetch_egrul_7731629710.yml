name: Temporary EGRUL lookup 7731629710

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch official EGRUL extract
        shell: bash
        run: |
          set -u
          mkdir -p out
          python - <<'PY'
          import json, time, requests, traceback
          s = requests.Session()
          s.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/136 Safari/537.36',
              'Referer':'https://egrul.nalog.ru/index.html',
              'Origin':'https://egrul.nalog.ru',
              'Accept':'application/json, text/javascript, */*; q=0.01',
              'X-Requested-With':'XMLHttpRequest'
          })
          try:
              r = s.post('https://egrul.nalog.ru/', data={'query':'7731629710','region':'','PreventChromeAutocomplete':''}, timeout=30)
              r.raise_for_status()
              init = r.json()
              open('out/fns_init.json','w',encoding='utf-8').write(json.dumps(init,ensure_ascii=False,indent=2))
              token = init.get('t')
              if not token:
                  raise RuntimeError(f'FNS token missing: {init}')
              data = None
              for _ in range(20):
                  rr = s.get(f'https://egrul.nalog.ru/search-result/{token}', timeout=30)
                  rr.raise_for_status()
                  try:
                      candidate = rr.json()
                  except Exception:
                      time.sleep(1.5)
                      continue
                  if candidate.get('rows') is not None:
                      data = candidate
                      break
                  time.sleep(1.5)
              if data is None:
                  raise RuntimeError('FNS search result timeout')
              open('out/fns_search.json','w',encoding='utf-8').write(json.dumps(data,ensure_ascii=False,indent=2))
              rows = data.get('rows') or []
              if not rows:
                  raise RuntimeError('No FNS search rows')
              file_token = rows[0].get('t')
              if not file_token:
                  raise RuntimeError('No extract token in FNS row')
              ts = int(time.time()*1000)
              vr = s.get(f'https://egrul.nalog.ru/vyp-request/{file_token}?r=&_={ts}', timeout=30)
              open('out/vyp_request.json','w',encoding='utf-8').write(vr.text)
              vr.raise_for_status()
              ready = False
              statuses=[]
              for _ in range(60):
                  ts = int(time.time()*1000)
                  st = s.get(f'https://egrul.nalog.ru/vyp-status/{file_token}?r={ts}&_={ts}', timeout=30)
                  statuses.append({'status_code':st.status_code,'body':st.text[:500]})
                  st.raise_for_status()
                  try:
                      status_data=st.json()
                  except Exception:
                      status_data={}
                  if status_data.get('status') == 'ready':
                      ready=True
                      break
                  time.sleep(2)
              open('out/vyp_statuses.json','w',encoding='utf-8').write(json.dumps(statuses,ensure_ascii=False,indent=2))
              if not ready:
                  raise RuntimeError('Extract did not become ready')
              pdf = s.get(f'https://egrul.nalog.ru/vyp-download/{file_token}', timeout=60, headers={'Accept':'application/pdf,application/octet-stream,*/*'})
              open('out/download_status.txt','w').write(str(pdf.status_code)+' '+pdf.headers.get('content-type','')+' '+str(len(pdf.content)))
              pdf.raise_for_status()
              if not pdf.content.startswith(b'%PDF'):
                  open('out/download_body.bin','wb').write(pdf.content)
                  raise RuntimeError('Downloaded content is not PDF')
              open('out/fns_extract.pdf','wb').write(pdf.content)
          except Exception:
              open('out/fns_error.txt','w',encoding='utf-8').write(traceback.format_exc())
          PY
          if command -v pdftotext >/dev/null 2>&1 && [ -f out/fns_extract.pdf ]; then
            pdftotext -layout out/fns_extract.pdf out/fns_extract.txt || true
          fi
      - name: Upload lookup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egrul-7731629710
          path: out/
          retention-days: 1

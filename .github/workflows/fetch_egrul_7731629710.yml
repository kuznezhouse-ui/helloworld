name: Temporary BFO lookup 7731629710

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch official BFO data
        shell: bash
        run: |
          set -u
          mkdir -p out
          python - <<'PY'
          import requests,json,re,traceback
          s=requests.Session(); s.headers.update({'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/136 Safari/537.36','Accept':'application/json, text/plain, */*','Referer':'https://bo.nalog.gov.ru/'})
          status={}
          candidates=[
            'https://bo.nalog.gov.ru/advanced-search/organizations/search',
            'https://bo.nalog.gov.ru/api/advanced-search/organizations/search',
            'https://bo.nalog.gov.ru/nbo/organizations/search'
          ]
          for idx,url in enumerate(candidates):
            try:
              r=s.get(url,params={'query':'7731629710','page':'0'},timeout=90,allow_redirects=True)
              status[str(idx)]={'url':r.url,'status':r.status_code,'ct':r.headers.get('content-type',''),'len':len(r.content)}
              open(f'out/candidate_{idx}.bin','wb').write(r.content)
              try: open(f'out/candidate_{idx}.json','w',encoding='utf-8').write(json.dumps(r.json(),ensure_ascii=False,indent=2))
              except Exception: pass
            except Exception: status[str(idx)]={'error':traceback.format_exc()}
          # inspect frontend JS for API paths
          try:
            h=s.get('https://bo.nalog.gov.ru/',timeout=90); txt=h.text
            m=re.findall(r'<script[^>]+src=["\']([^"\']+)',txt)
            status['scripts']=m
            for j,src in enumerate(m):
              if src.startswith('/'): src='https://bo.nalog.gov.ru'+src
              z=s.get(src,timeout=90); open(f'out/script_{j}.js','wb').write(z.content)
          except Exception: status['script_error']=traceback.format_exc()
          open('out/status.json','w',encoding='utf-8').write(json.dumps(status,ensure_ascii=False,indent=2))
          PY
      - name: Upload lookup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bfo-7731629710
          path: out/
          retention-days: 1
